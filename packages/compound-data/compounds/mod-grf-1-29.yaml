mechanismShort: "GHRH receptor agonist; produces discrete, physiological GH pulses (unlike DAC variant which creates sustained elevation). Four amino acid substitutions resist DPP-IV degradation."

dosing:
  min: 100
  typical: 100
  max: 200
  unit: mcg
  frequency: "2-3x/day, fasted (pre-bed primary, AM optional, pre-workout optional)"
  notes: "Always combine with a GHRP (ipamorelin preferred) — GHRH alone produces minimal GH release if somatostatin tone is high. Inject fasted (no carbs/fat 1h before). Pre-bed injection is most important — amplifies the natural nocturnal GH pulse. 100mcg is the saturation dose; higher doses don't produce proportionally more GH."

