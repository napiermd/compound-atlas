interactions:
  - target: ipamorelin
    type: synergistic
    severity: moderate
    description: "The gold standard peptide combination: mod-GRF 1-29 (GHRH) + ipamorelin (GHRP) produces 5-10x greater GH release than either alone while maintaining clean pulsatile physiology (no cortisol, no prolactin, no sustained elevation)"
  - target: ghrp-2
    type: synergistic
    severity: moderate
    description: "More potent GH release than ipamorelin pairing but with cortisol and prolactin trade-offs. For maximum GH output when side effects are acceptable."
  - target: ghrp-6
    type: synergistic
    severity: moderate
    description: "Synergistic GH release; GHRP-6 adds significant appetite stimulation (useful for bulking, problematic for cutting)"
  - target: cjc-1295-dac
    type: caution
    severity: moderate
    description: "Both are GHRH receptor agonists. Combining produces unpredictable GHRH receptor kinetics — choose one GHRH approach, not both."
  - target: hgh
    type: caution
    severity: moderate
    description: "Exogenous GH suppresses endogenous GH pathways; mod-GRF works by amplifying endogenous release. Using both is pharmacologically redundant."

mechanisms:
  - pathway: GHRH_receptor_agonism
    description: "Binds GHRHR on pituitary somatotrophs; activates Gs/cAMP/PKA cascade → GH gene transcription, GH vesicle mobilization, and exocytosis"
  - pathway: pulsatile_GH_preservation
    description: "30-minute half-life ensures GH is released in discrete pulses rather than sustained elevation. This preserves GH receptor sensitivity, diurnal GH rhythm, and insulin sensitivity."
  - pathway: DPP_IV_resistance
    description: "D-Ala2 substitution protects against dipeptidyl peptidase IV (DPP-IV) cleavage — the primary degradation pathway of native GHRH. Other substitutions protect against trypsin and methionine oxidation."
  - pathway: synergy_with_GHRP
    description: "GHRH and GHRP activate different receptor systems on somatotrophs (cAMP vs. IP3/calcium). Their signals converge intracellularly, producing multiplicative (not additive) GH release."

