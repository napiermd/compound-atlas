clinicalPhase: "Preclinical (modified research analog of sermorelin)"
evidenceLevel: C
description: |
  Modified GRF(1-29) — commonly mislabeled as "CJC-1295 without DAC" — is a synthetic
  analog of the first 29 amino acids of native GHRH with four amino acid substitutions
  (Ala2→D-Ala, Asn8→Gln, Ala15→Ala(Me), Met27→Leu) that protect against enzymatic
  degradation (DPP-IV, trypsin). This extends its half-life from ~7 minutes (native GHRH)
  to ~30 minutes — long enough to produce a meaningful GH pulse but short enough to
  preserve natural pulsatile GH physiology. This is the key advantage over CJC-1295 DAC:
  mod-GRF 1-29 triggers discrete GH pulses that mimic natural secretion patterns, then
  clears, allowing GH receptor resensitization between doses. Combined with a GHRP
  (ipamorelin being the preferred partner), this produces the "cleanest" GH-amplifying
  protocol available — physiologically pulsatile, no cortisol/prolactin elevation (when
  paired with ipamorelin), and no sustained insulin resistance. The standard of care in
  modern peptide therapy for anti-aging, recovery, and body composition.

